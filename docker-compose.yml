version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    image: diabetes-mlops-api:latest
    container_name: diabetes_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models         # persist trained model
      - ./mlruns:/app/mlruns         # persist MLflow experiments
    environment:
      MODEL_DIR: models
      MLFLOW_TRACKING_URI: mlruns
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── MLflow UI (optional) ─────────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: diabetes_mlflow
    command: >
      bash -c "pip install mlflow==2.22.4 -q &&
               mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    restart: unless-stopped

  # ── Frontend (production build) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: diabetes_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve dist -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
